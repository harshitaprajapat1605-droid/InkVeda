{% extends 'base.html' %}

{% block content %}
<section class="py-20 px-6 lg:px-16 min-h-[70vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-white p-10 premium-shadow text-center">
        <div class="mb-8">
            <h2 class="text-3xl font-serif mb-2">Custom Order Payment</h2>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-400">Order ID: #CUSTOM-{{ order.id }}</p>
        </div>

        <div class="py-8 border-y border-gray-100 mb-8">
            <p class="text-gray-500 text-sm uppercase tracking-widest mb-2 font-bold">Total Amount</p>
            <h3 class="text-5xl font-serif">₹{{ order.final_price }}</h3>
        </div>

        <div class="space-y-6">
            <div class="bg-gray-50 p-6 flex flex-col items-center">
                <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-4">Scan QR code to pay</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data={{ payment_link|urlencode }}" alt="Payment QR Code" class="w-48 h-48 mix-blend-multiply">
            </div>

            <div class="space-y-3">
                <button id="copy-btn" data-link="{{ payment_link }}" class="w-full py-4 bg-black text-white text-xs uppercase tracking-[0.2em] hover:bg-gray-800 transition-all flex items-center justify-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                    </svg>
                    <span>Copy Payment Link</span>
                </button>
                <p id="copy-status" class="text-[10px] uppercase tracking-widest text-green-500 h-4 transition-opacity opacity-0">Link Copied to Clipboard!</p>
            </div>
            
            <div class="pt-6">
                <p class="text-[10px] text-gray-400 leading-loose italic">
                    Once paid, please share the screenshot on WhatsApp or Email for verification.
                </p>
            </div>
        </div>
    </div>
</section>

<script>
document.getElementById('copy-btn').addEventListener('click', function() {
    const link = this.getAttribute('data-link');
    navigator.clipboard.writeText(link).then(() => {
        const status = document.getElementById('copy-status');
        status.classList.remove('opacity-0');
        setTimeout(() => {
            status.classList.add('opacity-0');
        }, 2000);
    });
});
</script>
{% endblock %}
