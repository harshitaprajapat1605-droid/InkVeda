{% extends 'base.html' %}

{% block nav_links %}
    <a href="{% url 'home' %}" class="nav-link text-sm uppercase tracking-wider">View Site</a>
    <a href="{% url 'admin_dashboard' %}" class="nav-link text-sm uppercase tracking-wider {% if request.resolver_match.url_name == 'admin_dashboard' %}text-[#C2A878] font-bold{% endif %}">Dashboard</a>
    <a href="{% url 'admin_analytics' %}" class="nav-link text-sm uppercase tracking-wider {% if request.resolver_match.url_name == 'admin_analytics' %}text-[#C2A878] font-bold{% endif %}">Analytics</a>
    <form action="{% url 'logout' %}" method="post" class="inline">
        {% csrf_token %}
        <button type="submit" class="text-xs uppercase tracking-widest text-red-400 hover:text-red-600 transition ml-4">Logout</button>
    </form>
{% endblock %}

{% block mobile_nav_links %}
    <a href="{% url 'home' %}" class="hover:italic">View Site</a>
    <a href="{% url 'admin_dashboard' %}" class="hover:italic {% if request.resolver_match.url_name == 'admin_dashboard' %}text-[#C2A878]{% endif %}">Dashboard</a>
    <a href="{% url 'admin_analytics' %}" class="hover:italic {% if request.resolver_match.url_name == 'admin_analytics' %}text-[#C2A878]{% endif %}">Analytics</a>
    <hr class="w-12 border-gray-300">
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit" class="text-red-400">Logout</button>
    </form>
{% endblock %}
